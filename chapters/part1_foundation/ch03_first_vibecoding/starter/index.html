<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>글자 수 세기</title>
  <style>
    /* 외부 라이브러리 없이, 한 페이지로 동작하는 글자 수 세기 도구입니다. */
    body {
      font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
      max-width: 640px;
      margin: 48px auto;
      padding: 0 16px;
      color: #1a1a1a;
      background: #fafafa;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 16px;
    }
    textarea {
      width: 100%;
      min-height: 180px;
      padding: 12px;
      font-size: 15px;
      line-height: 1.6;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      resize: vertical;
    }
    .count {
      margin-top: 16px;
      font-size: 18px;
      font-weight: 600;
    }
    .hint {
      margin-top: 8px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>글자 수 세기</h1>

  <!-- 입력 칸: 여기에 글을 적습니다. -->
  <textarea id="input" placeholder="여기에 글을 적어 보세요."></textarea>

  <!-- 결과: 입력이 바뀔 때마다 실시간으로 갱신됩니다. -->
  <p class="count">글자 수: <span id="count">0</span></p>
  <p class="hint">입력 칸의 내용이 바뀔 때마다 자동으로 다시 셉니다.</p>

  <script>
    // 입력 칸과 결과 표시 영역을 가져옵니다.
    var input = document.getElementById("input");
    var countView = document.getElementById("count");

    // 글자 수를 세어 화면에 보여 주는 함수입니다.
    // 빈 입력이면 length가 0이므로 자연스럽게 0이 표시됩니다.
    function updateCount() {
      var text = input.value;
      countView.textContent = text.length;
    }

    // 입력이 바뀔 때마다 실시간으로 다시 셉니다.
    input.addEventListener("input", updateCount);

    // 처음 화면을 열었을 때도 한 번 맞춰 둡니다.
    updateCount();
  </script>
</body>
</html>
